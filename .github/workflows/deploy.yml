name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5  # upgraded

      - name: Setup Node.js
        uses: actions/setup-node@v5  # upgraded
        with:
          node-version: '20'  # or 22/24 if your project supports it
          cache: 'npm'

      - name: Install dependencies
        run: npm ci  # better for CI

      - name: Create dist directory
        run: |
          mkdir -p dist
          rsync -av --exclude='.git' \
                    --exclude='.github' \
                    --exclude='node_modules' \
                    --exclude='package.json' \
                    --exclude='package-lock.json' \
                    --exclude='server.js' \
                    ./ dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5  # upgraded
        with:
          path: 'dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5  # upgraded